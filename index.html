<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>楓之谷男模會館 NanMoCLB</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --primary: #9b59b6; --gold: #f1c40f; --danger: #d63031; --neon-pink: #e84393; }
        body { 
            font-family: "Microsoft JhengHei", sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 10px; color: white; min-height: 100vh;
            background-image: url('background.png'); background-size: cover; background-position: center; background-attachment: fixed; background-repeat: no-repeat; background-color: #000;
        }
        .glass-panel { position: relative; z-index: 100; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); padding: 15px; width: 92%; max-width: 400px; text-align: center; margin-top: 10px; }
        .title-neon { font-size: 1.8rem; color: #fff; text-shadow: 0 0 15px var(--primary); animation: glow 2s infinite alternate; }
        @keyframes glow { from { text-shadow: 0 0 10px var(--primary); } to { text-shadow: 0 0 30px var(--primary); } }
        
        .room-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .room-btn { padding: 12px 5px; border-radius: 12px; cursor: pointer; font-weight: bold; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; }
        .room-btn span { display: block; font-size: 0.7rem; color: var(--gold); }
        .room-btn.full { background: #d63031 !important; opacity: 0.7; }
        
        #game-screen { display: none; width: 100%; flex-direction: column; align-items: center; z-index: 100; }
        .floor-row { display: flex; align-items: center; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1); width: 100%; }
        .floor-label { width: 45px; font-weight: bold; color: var(--gold); font-size: 0.9rem; }
        .tiles { display: flex; gap: 8px; flex: 1; justify-content: space-around; }
        .tile { width: 48px; height: 48px; border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: bold; cursor: pointer; background: rgba(255,255,255,0.1); }

        /* 音樂控制項 */
        #youtube-player { display: none; }
        .music-group { position: fixed; bottom: 30px; right: 20px; display: flex; gap: 15px; z-index: 10000; }
        .m-btn { width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 3px solid white; font-size: 28px; box-shadow: 0 4px 15px rgba(0,0,0,0.8); transition: 0.2s; }
        #music-toggle { background: linear-gradient(135deg, #6c5ce7, #a29bfe); }
        #music-next { background: linear-gradient(135deg, #e84393, #fd79a8); font-size: 22px; display: none; }
        .playing { animation: rotate 3s linear infinite; box-shadow: 0 0 25px #e84393 !important; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #reset-overlay { display: none; position: fixed; top: 20px; background: var(--danger); color: white; padding: 10px 25px; border-radius: 50px; font-weight: bold; z-index: 50000; border: 2px solid white; }
    </style>
</head>
<body>

    <div id="youtube-player"></div>
    
    <div class="music-group">
        <div id="music-toggle" class="m-btn" onclick="togglePlay()">🎵</div>
        <div id="music-next" class="m-btn" onclick="nextShuffle()">🔀</div>
    </div>

    <div id="reset-overlay">🚨 重置倒數中：<span id="timer-sec">60</span>s</div>

    <div id="room-selector" class="glass-panel">
        <h1 class="title-neon">楓之谷男模會館</h1>
        <div style="color:var(--gold); font-size:0.8rem; font-weight:bold;">CREATOR: 小帥</div>
        <div class="room-grid" id="room-buttons"></div>
    </div>

    <div id="game-screen">
        <div class="glass-panel" style="margin-bottom:10px; position:relative;">
            <button onclick="location.reload()" style="position:absolute; left:10px; top:10px; background:rgba(255,255,255,0.2); border:1px solid #fff; color:white; border-radius:5px; padding:3px 8px; font-size: 10px;">離開</button>
            <div id="room-display" style="color:var(--gold); font-weight:bold; font-size: 1.2rem;"></div>
            <div id="my-status" style="margin-top:5px; display:inline-block; padding:5px 15px; border-radius:15px; border:1px solid #fff; font-weight:bold;">連線中...</div>
            <button id="reset-btn" onclick="handleReset()" style="background:rgba(214,48,49,0.3); border:1px solid var(--danger); color:#ff7675; padding:8px; border-radius:8px; width:100%; margin-top:10px; font-weight:bold;">清空包廂</button>
        </div>
        <div class="glass-panel" style="padding: 10px;"><div id="board" style="display:flex; flex-direction:column-reverse;"></div></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const socket = io();
        const roomNames = ["燈紅酒綠", "酒池肉林", "紙醉金迷", "花天酒地", "歌舞昇平", "醉生夢死", "春宵苦短", "露水姻緣", "活色生香", "翻雲覆雨"];
        let myColor = '', currentRoomId = null;

        // --- 指定播放清單隨機播放邏輯 ---
        let player, isPlaying = false;
        const TARGET_PLAYLIST_ID = 'PLJq5gWE5PzSq5DkhVJle8zfz3wMCfvOC0';

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0', width: '0',
                playerVars: { 
                    'listType': 'playlist',
                    'list': TARGET_PLAYLIST_ID, // 載入你提供的清單
                    'enablejsapi': 1,
                    'origin': window.location.origin
                },
                events: { 
                    'onReady': (e) => {
                        e.target.setShuffle(true); // 開啟隨機模式
                    }
                }
            });
        }

        function togglePlay() {
            if (!player) return;
            const tBtn = document.getElementById('music-toggle');
            const nBtn = document.getElementById('music-next');
            if (!isPlaying) {
                player.playVideo();
                tBtn.classList.add('playing'); tBtn.innerText = '💿';
                nBtn.style.display = 'flex'; isPlaying = true;
            } else {
                player.pauseVideo();
                tBtn.classList.remove('playing'); tBtn.innerText = '🎵';
                nBtn.style.display = 'none'; isPlaying = false;
            }
        }

        function nextShuffle() {
            if (!player || !isPlaying) return;
            player.nextVideo(); // 跳到清單中的下一首隨機歌曲
            
            const nBtn = document.getElementById('music-next');
            nBtn.style.transform = "rotate(360deg)";
            setTimeout(() => nBtn.style.transform = "rotate(0deg)", 300);
        }

        // --- 房間管理與同步 (維持原有穩定邏輯) ---
        socket.on('roomCountsUpdate', (counts) => {
            const grid = document.getElementById('room-buttons'); grid.innerHTML = '';
            roomNames.forEach((name, i) => {
                const rid = i + 1, count = counts[rid] || 0;
                const btn = document.createElement('button');
                btn.className = 'room-btn' + (count >= 4 ? ' full' : (count > 0 ? ' has-people' : ''));
                btn.innerHTML = `<span>VIP ROOM ${rid}</span>${name}<br><small>👤 ${count}/4</small>`;
                btn.onclick = () => { if (count >= 4) return alert('客滿！'); socket.emit('joinRoom', rid); };
                grid.appendChild(btn);
            });
        });

        socket.on('joinSuccess', (data) => {
            currentRoomId = data.roomId; myColor = data.myColor;
            document.getElementById('room-selector').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('room-display').innerText = `🍷 ${roomNames[currentRoomId-1]}`;
            const s = document.getElementById('my-status'); s.style.backgroundColor = myColor; s.innerText = `我的顏色`;
            renderSync(data.state);
        });

        const board = document.getElementById('board');
        for (let f = 1; f <= 10; f++) {
            const row = document.createElement('div'); row.className = 'floor-row';
            row.innerHTML = `<div class="floor-label">F${f}</div>`;
            const ts = document.createElement('div'); ts.className = 'tiles';
            for (let t = 1; t <= 4; t++) {
                const tile = document.createElement('div'); tile.className = 'tile'; tile.id = `f${f}-${t}`; tile.innerText = t;
                tile.onclick = () => { if(myColor && socket.connected) socket.emit('click', { floor: f, tile: t, color: myColor }); };
                ts.appendChild(tile);
            }
            row.appendChild(ts); board.appendChild(row);
        }

        function handleReset() { if (confirm('重置包廂？')) socket.emit('requestReset'); }
        socket.on('resetCounting', (sec) => { document.getElementById('reset-overlay').style.display = 'block'; document.getElementById('timer-sec').innerText = sec; });
        socket.on('resetFinished', () => { document.getElementById('reset-overlay').style.display = 'none'; });
        function renderSync(state) {
            document.querySelectorAll('.tile').forEach(el => { el.style.backgroundColor = 'rgba(255,255,255,0.1)'; el.style.borderColor = 'rgba(255,255,255,0.3)'; });
            for (let k in state) { const el = document.getElementById(k); if (el) { el.style.backgroundColor = state[k]; el.style.borderColor = state[k]; } }
        }
        socket.on('sync', (state) => renderSync(state));
    </script>
</body>
</html>
