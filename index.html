<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>楓之谷男模會館 NanMoCLB</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --primary: #9b59b6; --gold: #f1c40f; --danger: #d63031; --neon-pink: #e84393; }
        body { 
            font-family: "Microsoft JhengHei", sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 10px; color: white; min-height: 100vh;
            background-image: url('background.png'); background-size: cover; background-position: center; background-attachment: fixed; overflow-x: hidden;
        }
        .glass-panel { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.15); padding: 15px; width: 92%; max-width: 400px; text-align: center; margin-top: 10px; }
        .title-neon { font-size: 1.8rem; color: #fff; text-shadow: 0 0 15px var(--primary); animation: glow 2s infinite alternate; margin: 5px 0; }
        @keyframes glow { from { text-shadow: 0 0 10px var(--primary); } to { text-shadow: 0 0 30px var(--primary); } }

        /* 房間管理 */
        .room-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .room-btn { padding: 15px 5px; border-radius: 12px; cursor: pointer; font-weight: bold; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; }
        .room-btn span { display: block; font-size: 0.7rem; color: var(--gold); margin-bottom: 3px; }
        .room-btn .count-badge { font-size: 0.65rem; background: rgba(0,0,0,0.5); border-radius: 10px; margin-top: 5px; display: inline-block; padding: 2px 8px; }
        .room-btn.has-people { border-color: var(--gold); box-shadow: 0 0 15px rgba(241,196,15,0.3); }
        .room-btn.full { background: linear-gradient(145deg, #d63031, #8b0000) !important; border-color: #ff7675 !important; cursor: not-allowed; }

        /* 棋盤介面 */
        #game-screen { display: none; width: 100%; flex-direction: column; align-items: center; }
        #my-status { display: inline-block; padding: 8px 25px; border-radius: 20px; font-weight: bold; margin-bottom: 10px; border: 2px solid rgba(255,255,255,0.4); }
        .floor-row { display: flex; align-items: center; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1); width: 100%; }
        .floor-label { width: 45px; font-weight: bold; color: var(--gold); font-size: 0.9rem; }
        .tiles { display: flex; gap: 8px; flex: 1; justify-content: space-around; }
        .tile { width: 48px; height: 48px; border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: bold; cursor: pointer; background: rgba(255,255,255,0.08); }

        /* 雙按鈕音樂控制 */
        #youtube-player { display: none; }
        .music-group { position: fixed; bottom: 25px; right: 20px; display: flex; gap: 12px; z-index: 9999; }
        .m-btn { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid white; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: 0.2s; }
        #music-toggle { background: linear-gradient(135deg, #6c5ce7, #a29bfe); }
        #music-next { background: linear-gradient(135deg, var(--neon-pink), #fd79a8); font-size: 18px; display: none; }
        .playing { animation: rotate-glow 2s linear infinite; box-shadow: 0 0 20px var(--neon-pink) !important; }
        @keyframes rotate-glow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #reset-overlay { display: none; position: fixed; top: 20px; background: var(--danger); color: white; padding: 12px 30px; border-radius: 50px; font-weight: bold; z-index: 5000; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="youtube-player"></div>
    <div class="music-group">
        <div id="music-toggle" class="m-btn" onclick="togglePlay()">🎵</div>
        <div id="music-next" class="m-btn" onclick="nextTrack
