<div class="music-group">
    <div id="music-toggle" class="m-btn" onclick="togglePlay()" title="開啟/關閉">🎵</div>
    <div id="music-next" class="m-btn" onclick="nextTrack()" style="display: none;" title="下一首">⏭️</div>
</div>

<div id="youtube-player"></div>

<style>
    /* 音樂按鈕群組佈局 */
    .music-group {
        position: fixed;
        bottom: 25px;
        right: 25px;
        display: flex;
        gap: 15px;
        z-index: 9999;
    }

    .m-btn {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border: 3px solid white;
        font-size: 24px;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
        transition: all 0.2s;
    }

    /* 開關按鈕：紫色霓虹 */
    #music-toggle {
        background: linear-gradient(135deg, #6c5ce7, #a29bfe);
    }

    /* 下一首按鈕：粉色霓虹 */
    #music-next {
        background: linear-gradient(135deg, #e84393, #fd79a8);
        font-size: 20px;
    }

    /* 播放時的旋轉動畫 */
    .playing { 
        animation: rotate-glow 2s linear infinite; 
        box-shadow: 0 0 25px #ff00ff !important;
    }

    @keyframes rotate-glow {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    const socket = io();
    // ... (保留之前的房間與棋盤變數) ...

    // --- 升級版音樂系統 ---
    let player;
    let isPlaying = false;
    let currentTrack = 0;
    const playlist = [
        'yupEwQ6qCd0', // 1. 攬佬 - 大展鴻圖
        '4Gv_hF7UuO8', // 2. 瘦子 - 辣台妹
        'hCh8H60UshM', // 3. 高爾宣 - Without You
        'z_D8S6WkFfM', // 4. 兄弟本色 - 迷途羔羊
        'p_p6_qjL7yM', // 5. 瘦子 - 變色龍
        'r6S_9unvV6M'  // 6. 玖壹壹 - 嘻哈庄腳情
    ];

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtube-player', {
            height: '0', width: '0',
            videoId: playlist[currentTrack],
            playerVars: { 'autoplay': 0, 'controls': 0, 'rel': 0 },
            events: { 
                'onStateChange': (e) => { if(e.data === YT.PlayerState.ENDED) nextTrack(); } 
            }
        });
    }

    // 開關邏輯
    function togglePlay() {
        const toggleBtn = document.getElementById('music-toggle');
        const nextBtn = document.getElementById('music-next');

        if (!isPlaying) {
            player.playVideo();
            toggleBtn.classList.add('playing');
            toggleBtn.innerText = '💿';
            nextBtn.style.display = 'flex'; // 顯示換歌鈕
            isPlaying = true;
        } else {
            player.pauseVideo();
            toggleBtn.classList.remove('playing');
            toggleBtn.innerText = '🎵';
            nextBtn.style.display = 'none'; // 隱藏換歌鈕
            isPlaying = false;
        }
    }

    // 換歌邏輯
    function nextTrack() {
        if (!isPlaying) return;
        currentTrack = (currentTrack + 1) % playlist.length;
        player.loadVideoById(playlist[currentTrack]);
        
        // 換歌時的小動畫效果
        const nextBtn = document.getElementById('music-next');
        nextBtn.style.transform = "scale(0.8)";
        setTimeout(() => nextBtn.style.transform = "scale(1)", 100);
        console.log("男模會館換曲中...");
    }

    // ... (保留之前的 Socket.io、房間生成、標記同步代碼) ...
</script>
