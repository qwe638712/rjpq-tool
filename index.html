<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>楓之谷男模會館 NanMoCLB</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --primary: #9b59b6; --gold: #f1c40f; --danger: #d63031; }
        body { 
            font-family: "Microsoft JhengHei", sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 15px; color: white; min-height: 100vh;
            background-image: url('background.png'); background-size: cover; background-position: center; background-attachment: fixed;
        }
        .glass-panel { background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(12px); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.15); padding: 20px; width: 95%; max-width: 420px; text-align: center; margin-top: 15px; }
        .room-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        
        /* 房間按鈕樣式 */
        .room-btn { padding: 15px 5px; border-radius: 12px; cursor: pointer; font-weight: bold; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; font-size: 1.1rem; }
        .room-btn span { display: block; font-size: 0.7rem; color: var(--gold); margin-bottom: 3px; }
        .room-btn .count-badge { font-size: 0.7rem; background: rgba(0,0,0,0.4); border-radius: 10px; margin-top: 5px; display: inline-block; padding: 2px 8px; }
        
        /* 滿人與有人狀態 */
        .room-btn.full { background: linear-gradient(145deg, #d63031, #8b0000) !important; border-color: #ff7675 !important; cursor: not-allowed; }
        .room-btn.has-people { border-color: var(--gold); box-shadow: 0 0 10px rgba(241,196,15,0.4); }

        #game-screen { display: none; width: 100%; flex-direction: column; align-items: center; }
        #my-status { display: inline-block; padding: 8px 25px; border-radius: 20px; font-weight: bold; margin-bottom: 10px; border: 2px solid rgba(255,255,255,0.3); }
        .tile { width: 52px; height: 52px; border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; cursor: pointer; background: rgba(255,255,255,0.08); transition: 0.1s; }
        .floor-row { display: flex; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .floor-label { width: 50px; font-weight: bold; color: var(--gold); }
        .tiles { display: flex; gap: 8px; flex: 1; justify-content: space-around; }
        
        /* 音樂鈕 */
        #music-ctrl { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2000; border: 2px solid white; font-size: 24px; box-shadow: 0 0 15px var(--primary); }
        .playing { animation: rotate 4s linear infinite; box-shadow: 0 0 25px #ff00ff; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        #reset-overlay { display: none; position: fixed; top: 20px; background: var(--danger); color: white; padding: 12px 30px; border-radius: 50px; font-weight: bold; z-index: 3000; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="music-ctrl" onclick="toggleMusic()">🎵</div>
    <audio id="bgm" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3" type="audio/mpeg"></audio>

    <div id="reset-overlay">🚨 包廂清空倒數：<span id="timer-sec">60</span>s</div>

    <div id="room-selector" class="glass-panel">
        <h1 style="margin:0; text-shadow: 0 0 10px var(--primary);">楓之谷男模會館</h1>
        <div style="color:var(--gold); font-size:0.8rem; font-weight:bold; margin-bottom:15px;">CREATOR: 小帥</div>
        <div class="room-grid" id="room-buttons"></div>
    </div>

    <div id="game-screen">
        <div class="glass-panel" style="margin-bottom:15px; position:relative;">
            <button onclick="location.reload()" style="position:absolute; left:10px; top:10px; background:none; border:1px solid #999; color:white; border-radius:5px;">離開</button>
            <div id="room-display" style="color:var(--gold); font-weight:bold; margin-bottom:5px;"></div>
            <div id="my-status">連線中...</div>
            <button id="reset-btn" onclick="handleReset()" style="background:rgba(214,48,49,0.2); border:1px solid var(--danger); color:#ff7675; padding:5px 15px; border-radius:5px; cursor:pointer;">清空包廂</button>
        </div>
        <div class="glass-panel"><div id="board" style="display:flex; flex-direction:column-reverse;"></div></div>
    </div>

    <script>
        const socket = io();
        const roomNames = ["燈紅酒綠", "酒池肉林", "紙醉金迷", "花天酒地", "歌舞昇平", "醉生夢死", "春宵苦短", "露水姻緣", "活色生香", "翻雲覆雨"];
        let myColor = '', currentRoomId = null, isCounting = false;

        function toggleMusic() {
            const a = document.getElementById('bgm'), b = document.getElementById('music-ctrl');
            if (a.paused) { a.play(); b.classList.add('playing'); b.innerText = '📻'; } 
            else { a.pause(); b.classList.remove('playing'); b.innerText = '🎵'; }
        }

        socket.on('roomCountsUpdate', (counts) => {
            const grid = document.getElementById('room-buttons');
            grid.innerHTML = '';
            roomNames.forEach((name, i) => {
                const rid = i + 1, count = counts[rid] || 0;
                const btn = document.createElement('button');
                btn.className = 'room-btn' + (count >= 4 ? ' full' : (count > 0 ? ' has-people' : ''));
                btn.innerHTML = `<span>VIP ROOM ${rid}</span>${name}<br><div class="count-badge">👤 ${count}/4</div>`;
                btn.onclick = () => {
                    if (count >= 4) return alert('這間滿了！換一間吧。');
                    socket.emit('joinRoom', rid);
                };
                grid.appendChild(btn);
            });
        });

        socket.on('joinSuccess', (data) => {
            currentRoomId = data.roomId; myColor = data.myColor;
            document.getElementById('room-selector').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('room-display').innerText = `🍷 當前包廂：${roomNames[currentRoomId-1]}`;
            const s = document.getElementById('my-status'); s.style.backgroundColor = myColor; s.innerText = `我的坐檯顏色`;
            renderSync(data.state);
        });

        // 生成 10 層樓 (F1-F10)
        const board = document.getElementById('board');
        for (let f = 1; f <= 10; f++) {
            const row = document.createElement('div'); row.className = 'floor-row';
            row.innerHTML = `<div class="floor-label">F${f}</div>`;
            const ts = document.createElement('div'); ts.className = 'tiles';
            for (let t = 1; t <= 4; t++) {
                const tile = document.createElement('div'); tile.className = 'tile'; tile.id = `f${f}-${t}`; tile.innerText = t;
                tile.onclick = () => { if(myColor && socket.connected) socket.emit('click', { floor: f, tile: t, color: myColor }); };
                ts.appendChild(tile);
            }
            row.appendChild(ts); board.appendChild(row);
        }

        function handleReset() {
            if (confirm(isCounting ? '確定要立即清空包廂？' : '發起 60 秒清空倒數？')) socket.emit('requestReset');
        }

        socket.on('resetCounting', (sec) => {
            isCounting = true;
            document.getElementById('reset-overlay').style.display = 'block';
            document.getElementById('timer-sec').innerText = sec;
            document.getElementById('reset-btn').innerText = '🔥 立即清空';
        });

        socket.on('resetFinished', () => {
            isCounting = false;
            document.getElementById('reset-overlay').style.display = 'none';
            document.getElementById('reset-btn').innerText = '清空包廂';
        });

        function renderSync(state) {
            document.querySelectorAll('.tile').forEach(el => { el.style.backgroundColor = 'rgba(255,255,255,0.08)'; el.style.borderColor = 'rgba(255,255,255,0.2)'; });
            for (let k in state) { const el = document.getElementById(k); if (el) { el.style.backgroundColor = state[k]; el.style.borderColor = state[k]; } }
        }
        socket.on('sync', (state) => renderSync(state));
        socket.on('errorMsg', (m) => alert(m));
    </script>
</body>
</html>
